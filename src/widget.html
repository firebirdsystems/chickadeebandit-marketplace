<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketplace Widget</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--hub-font, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
      font-size: 13px;
      background: #fff;
      color: #111827;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header { display: flex; align-items: center; gap: 6px; padding: 10px 14px 8px; border-bottom: 1px solid #e5e7eb; flex-shrink: 0; }
    .header-icon { font-size: 14px; }
    .header-title { font-size: 12px; font-weight: 600; color: #374151; flex: 1; }
    .header-link { font-size: 11px; color: #6366f1; text-decoration: none; }
    .header-link:hover { text-decoration: underline; }

    .content { flex: 1; padding: 10px 14px 12px; display: flex; flex-direction: column; gap: 8px; overflow: hidden; }

    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: #9ca3af;
      text-align: center;
    }
    .empty .icon { font-size: 1.8rem; }
    .empty p { font-size: 12px; }

    .listing-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 0;
      border-bottom: 1px solid #f3f4f6;
    }
    .listing-row:last-child { border-bottom: none; }

    .listing-thumb {
      width: 36px; height: 36px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
      background: #f3f4f6;
    }
    .listing-thumb-placeholder {
      width: 36px; height: 36px;
      border-radius: 6px;
      flex-shrink: 0;
      background: #f3f4f6;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
    }

    .listing-info { flex: 1; overflow: hidden; }
    .listing-title { font-weight: 500; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .listing-meta { font-size: 11px; color: #9ca3af; }

    .listing-price { font-size: 12px; font-weight: 600; color: #6366f1; white-space: nowrap; }
  </style>
</head>
<body>

<div class="header">
  <span class="header-icon">🛍️</span>
  <span class="header-title">Marketplace</span>
  <a class="header-link" href="/run/marketplace">Open</a>
</div>

<div class="content" id="content">
  <div class="empty">
    <span class="icon">🛍️</span>
    <p>No listings yet</p>
  </div>
</div>

<script type="module">
import { esc, createFilesHelper } from "/hub-sdk.js";
import { categoryIcon, formatPrice } from "./logic.js";

const DB        = window.__DB_URL       ?? "";
const FILES_URL = window.__FILES_URL    ?? "";
const files     = createFilesHelper(FILES_URL);

async function db(sql, params = []) {
  if (!DB) return { rows: [] };
  const res = await fetch(DB, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ sql, params }),
  });
  return res.json();
}

async function init() {
  const { rows: listings } = await db(`
    SELECT id, title, price_cents, category, created_at
    FROM app_marketplace__listings
    WHERE status = 'active'
    ORDER BY created_at DESC
    LIMIT 5
  `);
  if (!listings.length) return;

  const ids = listings.map(l => l.id);
  const { rows: photos } = await db(`
    SELECT listing_id, file_id
    FROM app_marketplace__listing_photos
    WHERE listing_id IN (${ids.map(() => "?").join(",")})
      AND position = 0
  `, ids);
  const photoByListing = new Map(photos.map(p => [p.listing_id, p.file_id]));

  const content = document.getElementById("content");
  content.innerHTML = listings.map(l => {
    const photo = photoByListing.get(l.id);
    const thumb = photo
      ? `<img class="listing-thumb" src="${files.url(photo)}" alt="" loading="lazy" />`
      : `<div class="listing-thumb-placeholder">${categoryIcon(l.category)}</div>`;
    return `
      <div class="listing-row">
        ${thumb}
        <div class="listing-info">
          <div class="listing-title">${esc(l.title)}</div>
          <div class="listing-meta">${esc(categoryIcon(l.category))}</div>
        </div>
        <span class="listing-price">${esc(formatPrice(l.price_cents))}</span>
      </div>
    `;
  }).join("");
}

init();
</script>
</body>
</html>
